<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>Media Archive Upload</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    :root {
      --bg: #eef2f7;
      --card: rgba(255, 255, 255, 0.96);
      --text: #0f172a;
      --muted: #64748b;
      --border: #dbe3ee;
      --accent: #1687e8;
      --accent2: #06b6d4;
      --success: #059669;
      --success-bg: #ecfdf5;
      --danger: #dc2626;
      --danger-bg: #fef2f2;
      --shadow: 0 14px 32px rgba(15, 23, 42, 0.10);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--text);
      font-family:
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.16), transparent 30%),
        radial-gradient(circle at top right, rgba(6, 182, 212, 0.14), transparent 28%),
        linear-gradient(180deg, #eef2f7, #f8fafc);
      min-height: 100vh;
      overflow: hidden;
    }

    .app {
      height: 100vh;
      padding: 14px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 12px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      background: var(--card);
      border: 1px solid rgba(203, 213, 225, 0.85);
      border-radius: var(--radius);
      padding: 10px 14px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .logo {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      color: #fff;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      font-weight: 900;
      flex: 0 0 auto;
    }

    h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
      letter-spacing: -0.02em;
    }

    .subtitle {
      margin: 1px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .status-inline {
      min-width: 280px;
      max-width: 520px;
      padding: 8px 10px;
      border-radius: 12px;
      background: #f1f5f9;
      color: #334155;
      border: 1px solid var(--border);
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: right;
    }

    .status-inline.success {
      color: var(--success);
      background: var(--success-bg);
      border-color: #a7f3d0;
    }

    .status-inline.error {
      color: var(--danger);
      background: var(--danger-bg);
      border-color: #fecaca;
    }

    .main {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(420px, 0.95fr) minmax(520px, 1.05fr);
      gap: 12px;
    }

    .panel {
      min-height: 0;
      background: var(--card);
      border: 1px solid rgba(203, 213, 225, 0.85);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      padding: 14px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      flex: 0 0 auto;
    }

    .panel-title {
      margin: 0;
      font-size: 15px;
      line-height: 1.3;
      font-weight: 850;
    }

    .badge {
      padding: 4px 8px;
      border-radius: 999px;
      background: #f1f5f9;
      color: #334155;
      font-size: 11px;
      font-weight: 800;
      white-space: nowrap;
    }

    label {
      display: block;
      margin: 8px 0 4px;
      font-weight: 800;
      color: #1e293b;
      font-size: 12px;
    }

    input,
    textarea,
    button {
      font: inherit;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 10px;
      background: #fff;
      color: var(--text);
      font-size: 13px;
      transition: border 0.15s ease, box-shadow 0.15s ease;
    }

    input:focus,
    textarea:focus {
      outline: none;
      border-color: rgba(37, 99, 235, 0.80);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    textarea {
      resize: vertical;
      min-height: 52px;
    }

    .form-scroll {
      min-height: 0;
      overflow: auto;
      padding-right: 4px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 0.62fr;
      gap: 8px;
    }

    .compact-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
      align-items: end;
    }

    #archiveMemo {
      height: 64px;
      min-height: 64px;
      max-height: 120px;
      font-family:
        ui-monospace,
        SFMono-Regular,
        Menlo,
        Monaco,
        Consolas,
        "Liberation Mono",
        monospace;
      font-size: 12px;
      line-height: 1.45;
    }

    .file-visible {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 7px 10px;
      background: #fff;
      color: var(--text);
      font-size: 13px;
      height: 37px;
    }

    .compact-note {
      color: var(--muted);
      font-size: 11px;
      margin: 3px 0 0;
      min-height: 14px;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 8px 12px;
      color: #fff;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      cursor: pointer;
      font-weight: 850;
      font-size: 13px;
      box-shadow: 0 8px 18px rgba(37, 99, 235, 0.18);
      transition: transform 0.15s ease, filter 0.15s ease;
      white-space: nowrap;
      height: 37px;
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.02);
    }

    button.ghost {
      color: #334155;
      background: #e2e8f0;
      box-shadow: none;
    }

    button.ghost:hover {
      background: #cbd5e1;
    }

    .preview-stack {
      min-height: 0;
      display: grid;
      grid-template-rows: 1fr 1fr;
      gap: 12px;
      flex: 1;
    }

    .preview-card {
      min-height: 0;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .preview-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      padding: 9px 11px;
      border-bottom: 1px solid var(--border);
      background: #f8fafc;
      min-height: 40px;
    }

    .preview-title {
      margin: 0;
      font-size: 12px;
      font-weight: 850;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .preview-meta {
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
    }

    .preview-body {
      min-height: 0;
      flex: 1;
      padding: 9px;
    }

    .image-frame {
      width: 100%;
      height: 100%;
      min-height: 210px;
      display: grid;
      place-items: center;
      overflow: hidden;
      border-radius: 11px;
      background:
        linear-gradient(45deg, #f1f5f9 25%, transparent 25%),
        linear-gradient(-45deg, #f1f5f9 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #f1f5f9 75%),
        linear-gradient(-45deg, transparent 75%, #f1f5f9 75%);
      background-size: 20px 20px;
      background-position: 0 0, 0 10px, 10px -10px, -10px 0;
    }

    .image-frame img {
      width: 100%;
      height: 100%;
      max-height: 100%;
      object-fit: contain;
      display: block;
      border-radius: 9px;
    }

    .empty-preview {
      padding: 18px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
    }

    .hidden {
      display: none !important;
    }

    pre {
      white-space: pre-wrap;
      word-break: break-word;
      background: #0f172a;
      color: #dbeafe;
      padding: 10px;
      border-radius: 12px;
      overflow: auto;
      font-size: 11px;
      max-height: 88px;
      margin: 8px 0 0;
    }

    .actions-fixed {
      flex: 0 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding-top: 10px;
      margin-top: 10px;
      border-top: 1px solid var(--border);
    }

    @media (max-width: 980px) {
      body {
        overflow: auto;
      }

      .app {
        height: auto;
      }

      .main {
        grid-template-columns: 1fr;
      }

      .panel {
        overflow: visible;
      }

      .preview-stack {
        grid-template-rows: auto;
      }

      .status-inline {
        min-width: 0;
        max-width: none;
        text-align: left;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="logo">M</div>
        <div>
          <h1>Media Archive Upload</h1>
          <p class="subtitle">左でプレビュー、右で保存情報を編集</p>
        </div>
      </div>

      <div id="saveStatus" class="status-inline">待機中</div>
    </header>

    <section class="main">
      <section class="panel">
        <div class="panel-header">
          <h2 class="panel-title">プレビュー</h2>
          <span class="badge">Before / After</span>
        </div>

        <div class="preview-stack">
          <div class="preview-card">
            <div class="preview-head">
              <p class="preview-title" id="localPreviewTitle">選択前</p>
              <div class="preview-meta" id="localPreviewMeta">Local</div>
            </div>
            <div class="preview-body">
              <div class="image-frame" id="localPreviewFrame">
                <div class="empty-preview">選択した画像がここに表示されます</div>
              </div>
            </div>
          </div>

          <div class="preview-card">
            <div class="preview-head">
              <p class="preview-title" id="savedPreviewTitle">保存後</p>
              <div class="preview-meta">Signed URL</div>
            </div>
            <div class="preview-body">
              <div class="image-frame" id="savedPreviewFrame">
                <div class="empty-preview">保存後プレビューがここに表示されます</div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2 class="panel-title">保存情報</h2>
          <span class="badge">Record</span>
        </div>

        <form id="uploadForm" class="form-scroll">
          <div class="grid-2">
            <div>
              <label>タイトル</label>
              <input name="title" required placeholder="例：かわいい猫の温かいポートレート" />
            </div>

            <div>
              <label>種別</label>
              <input name="kind" value="visual_asset" />
            </div>
          </div>

          <div class="compact-row">
            <div>
              <label>保存用メモ</label>
              <textarea id="archiveMemo" placeholder="# メディアアーカイブ保存用メモ"></textarea>
            </div>

            <button type="button" id="parseMemoButton">自動入力</button>
            <button type="button" id="clearMemoButton" class="ghost">クリア</button>
          </div>

          <p id="parseStatus" class="compact-note"></p>

          <div class="compact-row">
            <div>
              <label>画像選択</label>
              <input class="file-visible" type="file" name="file" accept="image/*" required />
            </div>

            <button type="button" id="clearFileButton" class="ghost">画像解除</button>
            <button type="button" id="dummyButton" class="ghost" style="visibility:hidden;">空</button>
          </div>

          <label>タグ（カンマ区切り）</label>
          <input name="tags" placeholder="猫, ポートレート, かわいい, 室内" />

          <div class="grid-2">
            <div>
              <label>キャラクター名</label>
              <input name="character_names" placeholder="例：ナガノAI, ナガノ玄" />
            </div>

            <div>
              <label>プロジェクト名</label>
              <input name="project_name" placeholder="例：メディアアーカイブ" />
            </div>
          </div>

          <label>元の依頼</label>
          <textarea name="original_request" placeholder="最初に入力した依頼内容"></textarea>

          <label>要約</label>
          <textarea name="summary" placeholder="内容の要約"></textarea>

          <label>最終メモ</label>
          <textarea name="final_note" placeholder="検索・再利用しやすい説明"></textarea>
        </form>

        <div class="actions-fixed">
          <div>
            <button type="submit" form="uploadForm">Supabaseへ保存</button>
            <button type="button" id="clearFormButton" class="ghost">リセット</button>
          </div>
        </div>

        <pre id="result" class="hidden"></pre>
      </section>
    </section>
  </main>

  <script>
    const FUNCTION_URL = "https://xxxxxxxx.supabase.co/functions/v1/media-archive";

    const uploadForm = document.getElementById("uploadForm");
    const fileInput = uploadForm.elements["file"];
    const archiveMemo = document.getElementById("archiveMemo");

    const parseStatus = document.getElementById("parseStatus");
    const saveStatus = document.getElementById("saveStatus");
    const result = document.getElementById("result");

    const localPreviewFrame = document.getElementById("localPreviewFrame");
    const localPreviewTitle = document.getElementById("localPreviewTitle");
    const localPreviewMeta = document.getElementById("localPreviewMeta");

    const savedPreviewFrame = document.getElementById("savedPreviewFrame");
    const savedPreviewTitle = document.getElementById("savedPreviewTitle");

    let localObjectUrl = null;

    function setStatus(message, type) {
      saveStatus.textContent = message || "待機中";
      saveStatus.classList.remove("success", "error");

      if (type === "success") {
        saveStatus.classList.add("success");
      } else if (type === "error") {
        saveStatus.classList.add("error");
      }
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeRegExp(value) {
      return String(value).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function extractSection(text, heading) {
      const pattern = new RegExp(
        "##\\s*" + escapeRegExp(heading) + "\\s*\\n+([\\s\\S]*?)(?=\\n##\\s|$)",
        "i"
      );

      const match = text.match(pattern);
      return match ? match[1].trim() : "";
    }

    function normalizeNone(value) {
      const trimmed = String(value || "").trim();

      if (
        trimmed === "なし" ||
        trimmed === "無し" ||
        trimmed === "無" ||
        trimmed === "-" ||
        trimmed.toLowerCase() === "none" ||
        trimmed.toLowerCase() === "null"
      ) {
        return "";
      }

      return trimmed;
    }

    function normalizeCommaText(value) {
      return String(value || "")
        .split(/\n|、|，|,/)
        .map((item) => item.trim())
        .filter(Boolean)
        .join(", ");
    }

    function setField(name, value, options = {}) {
      const field = uploadForm.elements[name];
      if (!field) return;

      const normalized = options.normalizeNone ? normalizeNone(value) : String(value || "").trim();

      if (normalized || options.allowEmpty) {
        field.value = normalized;
      }
    }

    function fillFormFromMemo() {
      const memo = archiveMemo.value;

      if (!memo.trim()) {
        parseStatus.textContent = "保存用メモが空です。";
        setStatus("保存用メモが空です。", "error");
        return;
      }

      const title = extractSection(memo, "タイトル");
      const kind = extractSection(memo, "種別");
      const tags = extractSection(memo, "タグ");
      const characterNames = extractSection(memo, "キャラクター名");
      const projectName = extractSection(memo, "プロジェクト名");
      const originalRequest = extractSection(memo, "元の依頼");
      const summary = extractSection(memo, "要約");
      const finalNote = extractSection(memo, "最終メモ");

      setField("title", title);
      setField("kind", kind || "visual_asset");
      setField("tags", normalizeCommaText(tags));
      setField("character_names", normalizeCommaText(normalizeNone(characterNames)), { allowEmpty: true });
      setField("project_name", projectName, { normalizeNone: true });
      setField("original_request", originalRequest);
      setField("summary", summary);
      setField("final_note", finalNote);

      const found = [
        title,
        kind,
        tags,
        characterNames,
        projectName,
        originalRequest,
        summary,
        finalNote
      ].filter((v) => String(v || "").trim()).length;

      if (found === 0) {
        parseStatus.textContent = "項目を読み取れませんでした。";
        setStatus("項目を読み取れませんでした。", "error");
        return;
      }

      parseStatus.textContent = `${found}項目を反映しました。`;
      setStatus(`${found}項目を反映しました。`, "success");
    }

    function titleFromFileName(fileNameText) {
      return String(fileNameText || "")
        .replace(/\.[^/.]+$/, "")
        .replace(/[_-]/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function formatBytes(bytes) {
      if (!Number.isFinite(bytes)) return "";
      if (bytes < 1024) return `${bytes} B`;
      if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
      return `${(bytes / 1024 / 1024).toFixed(2)} MB`;
    }

    function showLocalPreview(file) {
      if (localObjectUrl) {
        URL.revokeObjectURL(localObjectUrl);
        localObjectUrl = null;
      }

      if (!file) {
        localPreviewTitle.textContent = "選択前";
        localPreviewMeta.textContent = "Local";
        localPreviewFrame.innerHTML = `<div class="empty-preview">選択した画像がここに表示されます</div>`;
        return;
      }

      localObjectUrl = URL.createObjectURL(file);

      localPreviewTitle.textContent = file.name;
      localPreviewMeta.textContent = `${formatBytes(file.size)}`;
      localPreviewFrame.innerHTML = `<img src="${localObjectUrl}" alt="selected preview">`;

      const titleInput = uploadForm.elements["title"];
      if (!titleInput.value.trim()) {
        titleInput.value = titleFromFileName(file.name) || "無題のメディア";
      }

      setStatus(`選択中: ${file.name}`, "");
    }

    function showSavedPreview(url, title) {
      if (!url) {
        savedPreviewTitle.textContent = "保存後";
        savedPreviewFrame.innerHTML = `<div class="empty-preview">保存後プレビューがここに表示されます</div>`;
        return;
      }

      savedPreviewTitle.textContent = title || "保存済み";
      savedPreviewFrame.innerHTML = `<img src="${escapeHtml(url)}" alt="saved preview">`;
    }

    function resetLocalPreview() {
      if (localObjectUrl) {
        URL.revokeObjectURL(localObjectUrl);
        localObjectUrl = null;
      }

      fileInput.value = "";
      showLocalPreview(null);
    }

    document.getElementById("parseMemoButton").addEventListener("click", fillFormFromMemo);

    document.getElementById("clearMemoButton").addEventListener("click", () => {
      archiveMemo.value = "";
      parseStatus.textContent = "";
      setStatus("待機中", "");
    });

    document.getElementById("clearFileButton").addEventListener("click", () => {
      resetLocalPreview();
      setStatus("画像選択を解除しました。", "");
    });

    document.getElementById("clearFormButton").addEventListener("click", () => {
      uploadForm.reset();
      uploadForm.elements["kind"].value = "visual_asset";
      result.textContent = "";
      result.classList.add("hidden");
      archiveMemo.value = "";
      parseStatus.textContent = "";
      resetLocalPreview();
      showSavedPreview(null, "");
      setStatus("待機中", "");
    });

    fileInput.addEventListener("change", (event) => {
      const file = event.target.files[0];
      showLocalPreview(file);
    });

    uploadForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      result.textContent = "";
      result.classList.add("hidden");
      showSavedPreview(null, "");
      setStatus("保存中...", "");

      const formData = new FormData(uploadForm);

      try {
        const response = await fetch(FUNCTION_URL, {
          method: "POST",
          body: formData
        });

        const json = await response.json();

        if (!response.ok || json.error) {
          throw new Error(json.error || "保存に失敗しました。");
        }

        setStatus("保存しました。", "success");

        result.textContent = JSON.stringify(json, null, 2);
        result.classList.remove("hidden");

        if (json.result && json.result.preview_url) {
          showSavedPreview(json.result.preview_url, json.result.title);
        }
      } catch (error) {
        setStatus(error.message, "error");
      }
    });
  </script>
</body>
</html>
