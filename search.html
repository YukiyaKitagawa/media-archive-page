<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>Media Archive Search</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    :root {
      --bg: #eef2f7;
      --card: rgba(255, 255, 255, 0.96);
      --text: #0f172a;
      --muted: #64748b;
      --border: #dbe3ee;
      --accent: #1687e8;
      --accent2: #06b6d4;
      --success: #059669;
      --success-bg: #ecfdf5;
      --danger: #dc2626;
      --danger-bg: #fef2f2;
      --shadow: 0 14px 32px rgba(15, 23, 42, 0.10);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--text);
      font-family:
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.16), transparent 30%),
        radial-gradient(circle at top right, rgba(6, 182, 212, 0.14), transparent 28%),
        linear-gradient(180deg, #eef2f7, #f8fafc);
      min-height: 100vh;
      overflow: hidden;
    }

    .app {
      height: 100vh;
      padding: 14px;
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 12px;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      background: var(--card);
      border: 1px solid rgba(203, 213, 225, 0.85);
      border-radius: var(--radius);
      padding: 12px 14px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .logo {
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      color: #fff;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      font-weight: 900;
      flex: 0 0 auto;
    }

    h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
      letter-spacing: -0.02em;
    }

    .subtitle {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .link-button {
      text-decoration: none;
      border-radius: 10px;
      padding: 9px 12px;
      color: #334155;
      background: #e2e8f0;
      font-weight: 850;
      font-size: 13px;
      white-space: nowrap;
    }

    .search-panel {
      background: var(--card);
      border: 1px solid rgba(203, 213, 225, 0.85);
      border-radius: var(--radius);
      padding: 12px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      gap: 8px;
      align-items: center;
    }

    input,
    button {
      font: inherit;
    }

    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      background: #fff;
      color: var(--text);
      font-size: 14px;
      height: 42px;
    }

    input:focus {
      outline: none;
      border-color: rgba(37, 99, 235, 0.80);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      height: 42px;
      color: #fff;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      cursor: pointer;
      font-weight: 850;
      font-size: 13px;
      box-shadow: 0 8px 18px rgba(37, 99, 235, 0.18);
      white-space: nowrap;
    }

    button.ghost {
      color: #334155;
      background: #e2e8f0;
      box-shadow: none;
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .count-badge {
      height: 42px;
      min-width: 74px;
      padding: 0 12px;
      display: grid;
      place-items: center;
      border-radius: 10px;
      color: #334155;
      background: #f1f5f9;
      border: 1px solid var(--border);
      font-size: 13px;
      font-weight: 850;
      white-space: nowrap;
    }

    .status {
      min-height: 34px;
      padding: 8px 12px;
      border-radius: 12px;
      background: #f1f5f9;
      color: #334155;
      border: 1px solid var(--border);
      font-size: 13px;
      display: flex;
      align-items: center;
    }

    .status.success {
      color: var(--success);
      background: var(--success-bg);
      border-color: #a7f3d0;
    }

    .status.error {
      color: var(--danger);
      background: var(--danger-bg);
      border-color: #fecaca;
    }

    .content {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(360px, 0.85fr) minmax(520px, 1.15fr);
      gap: 12px;
    }

    .panel {
      min-height: 0;
      background: var(--card);
      border: 1px solid rgba(203, 213, 225, 0.85);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      padding: 14px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      flex: 0 0 auto;
    }

    .panel-title {
      margin: 0;
      font-size: 15px;
      font-weight: 850;
    }

    .hint {
      color: var(--muted);
      font-size: 12px;
    }

    .results {
      min-height: 0;
      overflow: auto;
      display: grid;
      gap: 10px;
      padding-right: 4px;
    }

    .result-card {
      display: grid;
      grid-template-columns: 92px 1fr;
      gap: 10px;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #fff;
      cursor: pointer;
      transition: border 0.15s ease, transform 0.15s ease, box-shadow 0.15s ease;
    }

    .result-card:hover {
      transform: translateY(-1px);
      border-color: rgba(37, 99, 235, 0.65);
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.08);
    }

    .result-card.active {
      border-color: rgba(37, 99, 235, 0.95);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.10);
    }

    .thumb {
      width: 92px;
      height: 72px;
      border-radius: 10px;
      overflow: hidden;
      background:
        linear-gradient(45deg, #f1f5f9 25%, transparent 25%),
        linear-gradient(-45deg, #f1f5f9 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #f1f5f9 75%),
        linear-gradient(-45deg, transparent 75%, #f1f5f9 75%);
      background-size: 16px 16px;
      background-position: 0 0, 0 8px, 8px -8px, -8px 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .result-body {
      min-width: 0;
    }

    .result-title {
      margin: 0;
      font-size: 14px;
      font-weight: 900;
      line-height: 1.35;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .result-meta {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 7px;
      max-height: 44px;
      overflow: hidden;
    }

    .tag {
      padding: 3px 7px;
      border-radius: 999px;
      background: #eff6ff;
      color: #1d4ed8;
      border: 1px solid #bfdbfe;
      font-size: 11px;
      font-weight: 800;
    }

    .empty {
      height: 100%;
      min-height: 220px;
      display: grid;
      place-items: center;
      color: var(--muted);
      text-align: center;
      border: 1px dashed var(--border);
      border-radius: 14px;
      background: #fff;
      padding: 24px;
    }

    .detail {
      min-height: 0;
      display: grid;
      grid-template-rows: minmax(190px, 0.7fr) auto minmax(260px, 1fr);
      gap: 12px;
      flex: 1;
    }

    .preview-box {
      min-height: 0;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #fff;
      padding: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .preview-box img {
      width: auto;
      height: auto;
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: block;
      border-radius: 10px;
    }

    .detail-title-area {
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #fff;
      padding: 12px;
    }

    .detail-title {
      margin: 0;
      font-size: 20px;
      line-height: 1.35;
      font-weight: 950;
    }

    .detail-subtitle {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .detail-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .memo-scroll {
      min-height: 0;
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #fff;
      padding: 14px;
    }

    .memo-block {
      margin-bottom: 14px;
      padding: 12px;
      border-radius: 12px;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
    }

    .memo-block:last-child {
      margin-bottom: 0;
    }

    .memo-label {
      margin: 0 0 6px;
      color: #1e3a8a;
      font-size: 12px;
      font-weight: 950;
    }

    .memo-value {
      margin: 0;
      color: #0f172a;
      font-size: 14px;
      line-height: 1.75;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .settings-list {
      margin: 0;
      padding: 0;
      display: grid;
      gap: 8px;
    }

    .settings-row {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 10px;
      align-items: start;
    }

    .settings-key {
      color: #1e3a8a;
      font-size: 12px;
      font-weight: 950;
    }

    .settings-value {
      color: #0f172a;
      font-size: 14px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .toast {
      position: fixed;
      right: 16px;
      bottom: 16px;
      max-width: 360px;
      padding: 10px 12px;
      border-radius: 12px;
      background: #0f172a;
      color: #fff;
      font-size: 13px;
      box-shadow: 0 12px 28px rgba(15, 23, 42, 0.24);
      opacity: 0;
      transform: translateY(12px);
      pointer-events: none;
      transition: opacity 0.18s ease, transform 0.18s ease;
      z-index: 20;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 980px) {
      body {
        overflow: auto;
      }

      .app {
        height: auto;
      }

      .topbar,
      .search-panel,
      .content {
        grid-template-columns: 1fr;
      }

      .top-actions {
        justify-content: flex-start;
      }

      .panel {
        min-height: 520px;
      }

      .detail {
        grid-template-rows: 320px auto auto;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="logo">S</div>
        <div>
          <h1>Media Archive Search</h1>
          <p class="subtitle">保存済みメディアを検索して、画像とメモを確認</p>
        </div>
      </div>

      <div class="top-actions">
        <a class="link-button" href="./index.html">保存ページへ</a>
      </div>
    </header>

    <section class="search-panel">
      <input
        id="searchInput"
        type="search"
        placeholder="例：猫、ナガノAI、永野建設、雨、工事現場、ポートレート"
        autocomplete="off"
      />
      <button id="searchButton" type="button">検索</button>
      <button id="clearButton" class="ghost" type="button">クリア</button>
      <div id="countBadge" class="count-badge">0件</div>
    </section>

    <section class="content">
      <section class="panel">
        <div class="panel-header">
          <h2 class="panel-title">検索結果</h2>
          <span class="hint">クリックで詳細表示</span>
        </div>

        <div id="status" class="status">ページを開いたら最新30件を表示します。</div>

        <div id="results" class="results" style="margin-top: 10px;">
          <div class="empty">検索結果がここに表示されます。</div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2 class="panel-title">詳細</h2>
          <span class="hint">プレビュー / 元の指示 / 要約 / 最終メモ / 選択設定</span>
        </div>

        <div id="detail" class="detail">
          <div class="preview-box">
            <div class="empty">左の検索結果からメディアを選択してください。</div>
          </div>

          <div class="detail-title-area">
            <h3 class="detail-title">未選択</h3>
            <p class="detail-subtitle">検索結果をクリックすると詳細が表示されます。</p>
          </div>

          <div class="memo-scroll">
            <div class="memo-block">
              <p class="memo-label">案内</p>
              <p class="memo-value">検索結果を選択すると、ここに「元の指示」「要約」「最終メモ」「選択設定」が表示されます。</p>
            </div>
          </div>
        </div>
      </section>
    </section>
  </main>

  <div id="toast" class="toast"></div>

  <script>
    const FUNCTION_URL = "https://jkacguhaabaqtrjaahgl.supabase.co/functions/v1/media-archive";

    const searchInput = document.getElementById("searchInput");
    const searchButton = document.getElementById("searchButton");
    const clearButton = document.getElementById("clearButton");
    const countBadge = document.getElementById("countBadge");
    const statusEl = document.getElementById("status");
    const resultsEl = document.getElementById("results");
    const detailEl = document.getElementById("detail");
    const toastEl = document.getElementById("toast");

    let currentResults = [];
    let selectedIndex = -1;

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function cleanMemoText(value) {
      let text = String(value || "").trim();

      text = text.replace(
        /\n?\s*---\s*\n+\s*アップロードサイト：\s*\n+\s*https:\/\/yukiyakitagawa\.github\.io\/media-archive-page\/?\s*$/g,
        ""
      );

      text = text.replace(
        /\n?\s*---\s*\n+\s*アップロードサイト\s*:\s*\n+\s*https:\/\/yukiyakitagawa\.github\.io\/media-archive-page\/?\s*$/g,
        ""
      );

      return text.trim() || "未指定";
    }

    function formatArray(value) {
      if (!value) return "なし";
      if (Array.isArray(value)) {
        return value.length ? value.join(", ") : "なし";
      }
      return String(value || "なし");
    }

    function formatDate(value) {
      if (!value) return "未指定";

      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return String(value);

      return new Intl.DateTimeFormat("ja-JP", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      }).format(date);
    }

    function setStatus(message, type = "") {
      statusEl.textContent = message;
      statusEl.classList.remove("success", "error");

      if (type === "success") {
        statusEl.classList.add("success");
      } else if (type === "error") {
        statusEl.classList.add("error");
      }
    }

    function showToast(message) {
      toastEl.textContent = message;
      toastEl.classList.add("show");

      window.setTimeout(() => {
        toastEl.classList.remove("show");
      }, 1800);
    }

    function renderTags(tags) {
      if (!Array.isArray(tags) || tags.length === 0) {
        return `<span class="tag">タグなし</span>`;
      }

      return tags
        .slice(0, 8)
        .map((tag) => `<span class="tag">${escapeHtml(tag)}</span>`)
        .join("");
    }

    function formatSettingsList(value) {
      if (!Array.isArray(value) || value.length === 0) {
        return "なし";
      }

      return value.join(", ");
    }

    function summarizePromptSettings(json) {
      const selectedSettings = json?.selectedSettings || {};
      const uiState = json?.uiState || {};

      const personas = Array.isArray(selectedSettings.personas)
        ? selectedSettings.personas.map((persona) => persona?.name).filter(Boolean)
        : [];

      const characters = Array.isArray(selectedSettings.characters)
        ? selectedSettings.characters.map((character) => character?.name).filter(Boolean)
        : [];

      const noneOptions = Array.isArray(selectedSettings.noneOptions)
        ? selectedSettings.noneOptions.map((option) => option?.label || option?.value).filter(Boolean)
        : [];

      return {
        personaCategoryName: uiState.personaCategoryName || "未指定",
        characterCategoryName: uiState.characterCategoryName || "未指定",
        personas,
        characters,
        collabPatternLabel: selectedSettings.collabPatternLabel || selectedSettings.collabPattern || "未指定",
        noneOptions,
      };
    }

    function settingsRow(label, value) {
      return `
        <div class="settings-row">
          <div class="settings-key">${escapeHtml(label)}</div>
          <div class="settings-value">${escapeHtml(value)}</div>
        </div>
      `;
    }

    function renderPromptSettingsSummary(summary) {
      return `
        <div class="settings-list">
          ${settingsRow("絵師カテゴリ", summary.personaCategoryName)}
          ${settingsRow("キャラカテゴリ", summary.characterCategoryName)}
          ${settingsRow("選択絵師", formatSettingsList(summary.personas))}
          ${settingsRow("選択キャラクター", formatSettingsList(summary.characters))}
          ${settingsRow("コラボパターン", summary.collabPatternLabel)}
          ${settingsRow("オプション", formatSettingsList(summary.noneOptions))}
        </div>
      `;
    }

    async function loadPromptSettings(url) {
      const block = document.getElementById("promptSettingsBlock");
      if (!block) return;

      if (!url) {
        block.innerHTML = `
          <p class="memo-label">選択設定</p>
          <p class="memo-value">設定付きJSONは保存されていません。</p>
        `;
        return;
      }

      block.innerHTML = `
        <p class="memo-label">選択設定</p>
        <p class="memo-value">設定付きJSONを読み込み中...</p>
      `;

      try {
        const response = await fetch(url);
        if (!response.ok) {
          throw new Error("設定付きJSONを読み込めませんでした。");
        }

        const json = await response.json();
        const summary = summarizePromptSettings(json);

        block.innerHTML = `
          <p class="memo-label">選択設定</p>
          ${renderPromptSettingsSummary(summary)}
        `;
      } catch (error) {
        block.innerHTML = `
          <p class="memo-label">選択設定</p>
          <p class="memo-value">${escapeHtml(error.message || "設定付きJSONを読み込めませんでした。")}</p>
        `;
      }
    }

    function renderResults(results) {
      currentResults = results || [];
      countBadge.textContent = `${currentResults.length}件`;

      if (currentResults.length === 0) {
        resultsEl.innerHTML = `<div class="empty">該当するメディアはありません。</div>`;
        renderEmptyDetail();
        return;
      }

      resultsEl.innerHTML = currentResults
        .map((item, index) => {
          const title = item.title || "無題";
          const projectName = item.project_name || "未指定";
          const characters = formatArray(item.character_names);
          const createdAt = formatDate(item.created_at);
          const previewUrl = item.preview_url || "";

          return `
            <article class="result-card ${index === selectedIndex ? "active" : ""}" data-index="${index}">
              <div class="thumb">
                ${
                  previewUrl
                    ? `<img src="${escapeHtml(previewUrl)}" alt="${escapeHtml(title)}">`
                    : `<span class="hint">No image</span>`
                }
              </div>

              <div class="result-body">
                <h3 class="result-title">${escapeHtml(title)}</h3>
                <p class="result-meta">${escapeHtml(projectName)} / ${escapeHtml(characters)}</p>
                <p class="result-meta">${escapeHtml(createdAt)}</p>
                <div class="tag-row">${renderTags(item.tags)}</div>
              </div>
            </article>
          `;
        })
        .join("");

      document.querySelectorAll(".result-card").forEach((card) => {
        card.addEventListener("click", () => {
          const index = Number(card.dataset.index);
          selectResult(index);
        });
      });

      selectResult(0);
    }

    function renderEmptyDetail() {
      selectedIndex = -1;

      detailEl.innerHTML = `
        <div class="preview-box">
          <div class="empty">左の検索結果からメディアを選択してください。</div>
        </div>

        <div class="detail-title-area">
          <h3 class="detail-title">未選択</h3>
          <p class="detail-subtitle">検索結果をクリックすると詳細が表示されます。</p>
        </div>

        <div class="memo-scroll">
          <div class="memo-block">
            <p class="memo-label">案内</p>
            <p class="memo-value">検索結果を選択すると、ここに「元の指示」「要約」「最終メモ」「選択設定」が表示されます。</p>
          </div>
        </div>
      `;
    }

    function selectResult(index) {
      selectedIndex = index;
      const item = currentResults[index];

      document.querySelectorAll(".result-card").forEach((card, cardIndex) => {
        card.classList.toggle("active", cardIndex === selectedIndex);
      });

      if (!item) {
        renderEmptyDetail();
        return;
      }

      renderDetail(item);
    }

    function renderDetail(item) {
      const title = item.title || "無題";
      const projectName = item.project_name || "未指定";
      const createdAt = formatDate(item.created_at);
      const originalRequest = cleanMemoText(item.original_request);
      const summary = cleanMemoText(item.summary);
      const finalNote = cleanMemoText(item.final_note);
      const previewUrl = item.preview_url || "";
      const promptJsonUrl = item.prompt_json_url || "";

      detailEl.innerHTML = `
        <div class="preview-box">
          ${
            previewUrl
              ? `<img src="${escapeHtml(previewUrl)}" alt="${escapeHtml(title)}">`
              : `<div class="empty">プレビューURLがありません。</div>`
          }
        </div>

        <div class="detail-title-area">
          <h3 class="detail-title">${escapeHtml(title)}</h3>
          <p class="detail-subtitle">${escapeHtml(projectName)} / ${escapeHtml(createdAt)}</p>

          <div class="detail-actions">
            <button type="button" id="openPreviewButton" ${previewUrl ? "" : "disabled"}>プレビューを開く</button>
            <button type="button" id="openPromptJsonButton" class="ghost" ${promptJsonUrl ? "" : "disabled"}>設定JSONを開く</button>
            <button type="button" id="copyFinalNoteButton" class="ghost">最終メモコピー</button>
          </div>
        </div>

        <div class="memo-scroll">
          <div class="memo-block">
            <p class="memo-label">元の指示</p>
            <p class="memo-value">${escapeHtml(originalRequest)}</p>
          </div>

          <div class="memo-block">
            <p class="memo-label">要約</p>
            <p class="memo-value">${escapeHtml(summary)}</p>
          </div>

          <div class="memo-block">
            <p class="memo-label">最終メモ</p>
            <p class="memo-value">${escapeHtml(finalNote)}</p>
          </div>

          <div class="memo-block" id="promptSettingsBlock">
            <p class="memo-label">選択設定</p>
            <p class="memo-value">設定付きJSONを確認しています...</p>
          </div>
        </div>
      `;

      const openPreviewButton = document.getElementById("openPreviewButton");
      const openPromptJsonButton = document.getElementById("openPromptJsonButton");
      const copyFinalNoteButton = document.getElementById("copyFinalNoteButton");

      if (openPreviewButton) {
        openPreviewButton.addEventListener("click", () => {
          if (previewUrl) {
            window.open(previewUrl, "_blank", "noopener,noreferrer");
          }
        });
      }

      if (openPromptJsonButton) {
        openPromptJsonButton.addEventListener("click", () => {
          if (promptJsonUrl) {
            window.open(promptJsonUrl, "_blank", "noopener,noreferrer");
          }
        });
      }

      copyFinalNoteButton.addEventListener("click", async () => {
        await copyText(finalNote);
        showToast("最終メモをコピーしました。");
      });

      loadPromptSettings(promptJsonUrl);
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
      } catch {
        const textarea = document.createElement("textarea");
        textarea.value = text;
        textarea.style.position = "fixed";
        textarea.style.left = "-9999px";
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand("copy");
        document.body.removeChild(textarea);
      }
    }

    async function searchRecords() {
      const query = searchInput.value.trim();

      searchButton.disabled = true;
      clearButton.disabled = true;
      setStatus(query ? `「${query}」を検索中...` : "最新30件を読み込み中...");

      try {
        const response = await fetch(FUNCTION_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            action: "search",
            query,
            limit: 30
          })
        });

        const json = await response.json();

        if (!response.ok || json.error) {
          throw new Error(json.error || "検索に失敗しました。");
        }

        const results = json.results || [];

        setStatus(
          query
            ? `「${query}」の検索結果：${results.length}件`
            : `最新の保存メディア：${results.length}件`,
          "success"
        );

        selectedIndex = -1;
        renderResults(results);
      } catch (error) {
        countBadge.textContent = "0件";
        resultsEl.innerHTML = `<div class="empty">検索に失敗しました。<br>${escapeHtml(error.message)}</div>`;
        renderEmptyDetail();
        setStatus(error.message, "error");
      } finally {
        searchButton.disabled = false;
        clearButton.disabled = false;
      }
    }

    searchButton.addEventListener("click", searchRecords);

    clearButton.addEventListener("click", () => {
      searchInput.value = "";
      searchRecords();
    });

    searchInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        searchRecords();
      }
    });

    window.addEventListener("DOMContentLoaded", () => {
      searchRecords();
    });
  </script>
</body>
</html>
